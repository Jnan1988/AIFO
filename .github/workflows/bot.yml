name: Trading Bot Automation

on:
  workflow_dispatch: # Allows manual run from the "Actions" tab
  schedule:
    - cron: '*/30 * * * *' # Automatically runs every 30 minutes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Latest version to avoid Node warnings

      - name: Set up Python
        uses: actions/setup-python@v5 # Latest version
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests pandas-ta

      - name: Run Trading Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # Forces the runner to use Node 24 for all steps to clear deprecation warnings
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python bot.py

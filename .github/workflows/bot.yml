name: Trading Bot Automation

on:
  schedule:
    - cron: "*/15 * * * *"   # Runs every 15 minutes
  workflow_dispatch:         # Manual run button

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install yfinance pandas_ta scikit-learn requests

      - name: Run bot (debug)
  run: |
    python your_script.py || echo "Script failed"
